version: '3.9'

services:

  ###########################################################
  # CONTROLLERS
  ###########################################################

  controller-1:
    image: apache/kafka:latest
    container_name: controller-1

    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk # must be same across all the nodes

      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: controller

      KAFKA_LISTENERS: CONTROLLER://:9093

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_CONTROLLER_QUORUM_VOTERS: >
        1@controller-1:9093,
        2@controller-2:9093,
        3@controller-3:9093

    volumes:
      - controller-1-data:/var/lib/kafka/data


  controller-2:
    image: apache/kafka:latest
    container_name: controller-2

    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: controller

      KAFKA_LISTENERS: CONTROLLER://:9093

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_CONTROLLER_QUORUM_VOTERS: >
        1@controller-1:9093,
        2@controller-2:9093,
        3@controller-3:9093

    volumes:
      - controller-2-data:/var/lib/kafka/data


  controller-3:
    image: apache/kafka:latest
    container_name: controller-3

    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: controller

      KAFKA_LISTENERS: CONTROLLER://:9093

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_CONTROLLER_QUORUM_VOTERS: >
        1@controller-1:9093,
        2@controller-2:9093,
        3@controller-3:9093

    volumes:
      - controller-3-data:/var/lib/kafka/data


  ###########################################################
  # BROKERS
  ###########################################################

  broker-1:
    image: apache/kafka:latest
    container_name: broker-1

    ports:
      - "29092:9092"

    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

      KAFKA_NODE_ID: 4
      KAFKA_PROCESS_ROLES: broker

      KAFKA_LISTENERS: >
        PLAINTEXT://:19092,
        PLAINTEXT_HOST://:9092

      KAFKA_ADVERTISED_LISTENERS: >
        PLAINTEXT://broker-1:19092,
        PLAINTEXT_HOST://localhost:29092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: >
        PLAINTEXT:PLAINTEXT,
        PLAINTEXT_HOST:PLAINTEXT,
        CONTROLLER:PLAINTEXT

      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_CONTROLLER_QUORUM_VOTERS: >
        1@controller-1:9093,
        2@controller-2:9093,
        3@controller-3:9093

      ###################################################
      # Important Replication Settings
      ###################################################

      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3

      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2

      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

      KAFKA_NUM_PARTITIONS: 3

    depends_on:
      - controller-1
      - controller-2
      - controller-3

    volumes:
      - broker-1-data:/var/lib/kafka/data


  broker-2:
    image: apache/kafka:latest
    container_name: broker-2

    ports:
      - "39092:9092"

    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

      KAFKA_NODE_ID: 5
      KAFKA_PROCESS_ROLES: broker

      KAFKA_LISTENERS: >
        PLAINTEXT://:19092,
        PLAINTEXT_HOST://:9092

      KAFKA_ADVERTISED_LISTENERS: >
        PLAINTEXT://broker-2:19092,
        PLAINTEXT_HOST://localhost:39092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: >
        PLAINTEXT:PLAINTEXT,
        PLAINTEXT_HOST:PLAINTEXT,
        CONTROLLER:PLAINTEXT

      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_CONTROLLER_QUORUM_VOTERS: >
        1@controller-1:9093,
        2@controller-2:9093,
        3@controller-3:9093

      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3

      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2

      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

      KAFKA_NUM_PARTITIONS: 3

    depends_on:
      - controller-1
      - controller-2
      - controller-3

    volumes:
      - broker-2-data:/var/lib/kafka/data


  broker-3:
    image: apache/kafka:latest
    container_name: broker-3

    ports:
      - "49092:9092"

    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

      KAFKA_NODE_ID: 6
      KAFKA_PROCESS_ROLES: broker

      KAFKA_LISTENERS: >
        PLAINTEXT://:19092,
        PLAINTEXT_HOST://:9092

      KAFKA_ADVERTISED_LISTENERS: >
        PLAINTEXT://broker-3:19092,
        PLAINTEXT_HOST://localhost:49092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: >
        PLAINTEXT:PLAINTEXT,
        PLAINTEXT_HOST:PLAINTEXT,
        CONTROLLER:PLAINTEXT

      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_CONTROLLER_QUORUM_VOTERS: >
        1@controller-1:9093,
        2@controller-2:9093,
        3@controller-3:9093

      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3

      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2

      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

      KAFKA_NUM_PARTITIONS: 3

    depends_on:
      - controller-1
      - controller-2
      - controller-3

    volumes:
      - broker-3-data:/var/lib/kafka/data


  ###########################################################
  # KAFKA UI
  ###########################################################

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui

    ports:
      - "8080:8080"

    environment:
      KAFKA_CLUSTERS_0_NAME: Kafka-kraft-local

      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: >
        broker-1:19092,
        broker-2:19092,
        broker-3:19092

    depends_on:
      - broker-1
      - broker-2
      - broker-3


###########################################################
# VOLUMES
###########################################################

volumes:
  controller-1-data:
  controller-2-data:
  controller-3-data:

  broker-1-data:
  broker-2-data:
  broker-3-data: